name = "HAL"
prefix = "hal"
author = "HAL-Team"
mainprefix = "z"

[files]
include = [
    "mod.cpp",
    "README*.md",  # Translated READMEs get moved to root in a hook (virtual file system)
    "LICENSE",
]

[version]
git_hash = 0

[lints.sqf]
command_case = false
if_not_else = false
select_parse_number = false
not_private = false
var_all_caps = false
unused = false
# Phase 1 legacy debt — tightened in Phase 3 per D-11
undefined = true         # L-S13 undefined_variable — tightened in Phase 3-06 (D-11 closure) to catch bare RYD_* regressions
extra_not = false        # L-S19 unneeded_not (fnc_cff_ffe)
config_of = false        # L-S30 typeof_configof (fnc_ammoFullCount, fnc_groupMarkerLoop, fnc_cff_ffe)

[lints.config]
# Phase 1 legacy debt — tightened in Phase 3 per D-11
unused_external = false  # L-C14 unused external class (missionmodules/CfgVehicles.hpp AttributeValues)
